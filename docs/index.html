<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UDN Reader</title>
<style>
:root {
  --bg: #fafafa;
  --card-bg: #fff;
  --text: #1a1a1a;
  --text-secondary: #666;
  --accent: #c0392b;
  --accent-light: #e74c3c;
  --border: #e8e8e8;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* Header */
header {
  background: var(--accent);
  color: #fff;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

.header-inner {
  max-width: 720px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  min-height: 52px;
  padding: 0 16px;
}

.logo {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  flex: 1;
}

.font-controls {
  display: flex;
  gap: 4px;
}

.font-btn {
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.4);
  color: #fff;
  border-radius: 4px;
  width: 32px;
  height: 32px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.font-btn:active { background: rgba(255,255,255,0.35); }

.back-btn {
  background: none;
  border: none;
  color: #fff;
  font-size: 22px;
  cursor: pointer;
  padding: 8px 12px 8px 0;
  display: none;
}

/* Tabs */
.tabs {
  display: flex;
  max-width: 720px;
  margin: 0 auto;
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
}

.tab {
  flex: 1;
  padding: 14px 0;
  text-align: center;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  color: var(--text-secondary);
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
  user-select: none;
}

.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

.tab:active { opacity: 0.7; }

/* Content area */
.content {
  max-width: 720px;
  margin: 0 auto;
}

/* Slider / Carousel */
.slider {
  position: relative;
  overflow: hidden;
  background: #000;
}

.slider-track {
  display: flex;
  transition: transform 0.35s ease;
}

.slider-item {
  min-width: 100%;
  position: relative;
  cursor: pointer;
}

.slider-item img {
  width: 100%;
  aspect-ratio: 16/9;
  object-fit: cover;
  display: block;
}

.slider-item .slider-title {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 40px 16px 14px;
  background: linear-gradient(transparent, rgba(0,0,0,0.8));
  color: #fff;
  font-size: var(--body-font-size, 16px);
  font-weight: 600;
  line-height: 1.4;
}

.slider-dots {
  position: absolute;
  bottom: 8px;
  right: 12px;
  display: flex;
  gap: 6px;
}

.slider-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.4);
  cursor: pointer;
}

.slider-dot.active {
  background: #fff;
}

.slider-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.3);
  color: #fff;
  border: none;
  font-size: 20px;
  padding: 12px 8px;
  cursor: pointer;
  z-index: 2;
}

.slider-nav:hover { background: rgba(0,0,0,0.5); }
.slider-prev { left: 0; border-radius: 0 4px 4px 0; }
.slider-next { right: 0; border-radius: 4px 0 0 4px; }

/* Tiles */
.tiles {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 10px;
  background: var(--bg);
}

.tile {
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  aspect-ratio: 16/9;
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: flex-end;
  text-decoration: none;
}

.tile-title {
  width: 100%;
  padding: 24px 10px 8px;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
  color: #fff;
  font-size: 14px;
  font-weight: 600;
}

/* Section headers */
.section-header {
  padding: 18px 16px 10px;
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  background: var(--bg);
  border-bottom: 2px solid var(--accent);
}

/* Article cards */
.article-card {
  display: flex;
  gap: 14px;
  padding: 14px 16px;
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
}

.article-card:active { background: #f0f0f0; }

.card-text {
  flex: 1;
  min-width: 0;
}

.card-title {
  font-size: var(--body-font-size, 15px);
  font-weight: 600;
  line-height: 1.45;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 4px;
}

.card-summary {
  font-size: calc(var(--body-font-size, 15px) - 2px);
  color: var(--text-secondary);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 4px;
}

.card-time {
  font-size: 12px;
  color: #999;
}

.card-thumb {
  width: 100px;
  height: 68px;
  border-radius: 6px;
  object-fit: cover;
  flex-shrink: 0;
  background: #eee;
}

/* Article view */
.article-view {
  display: none;
  max-width: 720px;
  margin: 0 auto;
  padding: 20px 16px 60px;
  background: var(--card-bg);
  min-height: calc(100vh - 52px);
}

.article-view h1 {
  font-size: calc(var(--body-font-size, 17px) + 5px);
  font-weight: 700;
  line-height: 1.45;
  margin-bottom: 12px;
}

.article-meta {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.article-cover {
  width: 100%;
  border-radius: 6px;
  margin-bottom: 6px;
}

.article-cover-caption {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 20px;
  text-align: center;
}

.article-body p {
  font-size: var(--body-font-size, 17px);
  line-height: 1.85;
  margin-bottom: 20px;
}

.article-body .inline-img {
  width: 100%;
  border-radius: 6px;
  margin-bottom: 6px;
}

.article-body .inline-caption {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 20px;
  text-align: center;
}

/* Loading / empty */
.loading {
  text-align: center;
  padding: 40px;
  color: var(--text-secondary);
  font-size: 15px;
}

.empty {
  text-align: center;
  padding: 60px 20px;
  color: #bbb;
  font-size: 15px;
}

.update-time {
  text-align: center;
  font-size: 13px;
  color: #666;
  padding: 10px 16px;
  max-width: 720px;
  margin: 0 auto;
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
}

/* Scroll to top */
.scroll-top {
  position: fixed;
  bottom: 24px;
  right: 20px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  border: none;
  font-size: 22px;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 90;
}

.scroll-top.visible { display: flex; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <button class="back-btn" id="backBtn" onclick="goHome()">&#8592;</button>
    <div class="logo" onclick="goHome()">UDN Reader</div>
    <div class="font-controls">
      <button class="font-btn" onclick="changeFontSize(-1)" title="縮小字體">A-</button>
      <button class="font-btn" onclick="changeFontSize(1)" title="放大字體">A+</button>
    </div>
  </div>
</header>

<div id="homeView">
  <div class="tabs">
    <div class="tab active" data-cat="全球" onclick="switchTab('全球')">全球</div>
    <div class="tab" data-cat="運動" onclick="switchTab('運動')">運動</div>
  </div>
  <div class="update-time" id="updateTime"></div>
  <div class="content" id="content">
    <div class="loading">載入中...</div>
  </div>
</div>

<div class="article-view" id="articleView"></div>

<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">&uarr;</button>

<script>
let data = {};
let currentTab = '全球';
let sliderInterval = null;
let sliderIndex = 0;
const BASE = window.location.pathname.replace(/\/index\.html$/, '').replace(/\/$/, '');

/* Font size */
const FONT_SIZES = [14, 15, 17, 19, 21, 24];
let fontSizeIdx = FONT_SIZES.indexOf(parseInt(localStorage.getItem('fontSize')) || 17);
if (fontSizeIdx < 0) fontSizeIdx = 2;
applyFontSize();

function changeFontSize(delta) {
  fontSizeIdx = Math.max(0, Math.min(FONT_SIZES.length - 1, fontSizeIdx + delta));
  localStorage.setItem('fontSize', FONT_SIZES[fontSizeIdx]);
  applyFontSize();
}

function applyFontSize() {
  document.documentElement.style.setProperty('--body-font-size', FONT_SIZES[fontSizeIdx] + 'px');
}

async function init() {
  try {
    const cb = Date.now();
    const resp = await fetch(`${BASE}/data/listings.json?v=${cb}`);
    data = await resp.json();
    renderSection();
    // Load update time
    const metaResp = await fetch(`${BASE}/data/meta.json?v=${cb}`);
    const meta = await metaResp.json();
    if (meta.updated_at) {
      lastUpdated = meta.updated_at;
      const d = new Date(meta.updated_at);
      const local = d.toLocaleString('zh-TW', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
      document.getElementById('updateTime').textContent = `最後更新：${local}`;
    }
  } catch (e) {
    document.getElementById('content').innerHTML = '<div class="empty">無法載入資料</div>';
  }

  window.addEventListener('popstate', (e) => {
    if (e.state && e.state.article) {
      showArticle(e.state.article, true);
    } else {
      goHome(true);
    }
  });

  const hash = decodeURIComponent(window.location.hash.slice(1));
  if (hash.startsWith('article/')) {
    showArticle(hash.split('/')[1]);
  } else if (hash === '運動' || hash === '全球') {
    switchTab(hash);
  }
}

function switchTab(cat) {
  currentTab = cat;
  window.location.hash = cat;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.cat === cat);
  });
  renderSection();
  window.scrollTo(0, 0);
}

function renderSection() {
  stopSlider();
  const container = document.getElementById('content');
  const section = data[currentTab];

  if (!section) {
    container.innerHTML = '<div class="empty">暫無資料</div>';
    return;
  }

  let html = '';

  // Slider
  if (section.slider && section.slider.length) {
    html += renderSlider(section.slider);
  }

  // Tiles
  if (section.tiles && section.tiles.length) {
    html += '<div class="tiles">';
    for (const tile of section.tiles) {
      html += `
        <a class="tile" href="${esc(tile.href)}" target="_blank"
           style="background-image: url('${esc(tile.image)}')">
          <span class="tile-title">${esc(tile.title)}</span>
        </a>`;
    }
    html += '</div>';
  }

  // Sub-sections
  for (const sub of (section.subsections || [])) {
    html += `<div class="section-header">${esc(sub.name)}</div>`;
    for (const item of sub.articles) {
      html += renderCard(item);
    }
  }

  container.innerHTML = html;

  // Start slider auto-play
  if (section.slider && section.slider.length > 1) {
    sliderIndex = 0;
    startSlider(section.slider.length);
    initSliderTouch();
  }
}

function renderSlider(items) {
  const slides = items.map(item => `
    <div class="slider-item" onclick="showArticle('${item.article_id}')">
      <img src="${esc(item.thumbnail)}" alt="" loading="lazy">
      <div class="slider-title">${esc(item.title)}</div>
    </div>
  `).join('');

  const dots = items.map((_, i) => `
    <div class="slider-dot${i === 0 ? ' active' : ''}" onclick="goToSlide(${i})"></div>
  `).join('');

  return `
    <div class="slider">
      <div class="slider-track" id="sliderTrack">${slides}</div>
      <button class="slider-nav slider-prev" onclick="prevSlide()">&lsaquo;</button>
      <button class="slider-nav slider-next" onclick="nextSlide()">&rsaquo;</button>
      <div class="slider-dots" id="sliderDots">${dots}</div>
    </div>
  `;
}

function renderCard(item) {
  return `
    <div class="article-card" onclick="showArticle('${item.article_id}')">
      <div class="card-text">
        <div class="card-title">${esc(item.title)}</div>
        ${item.summary ? `<div class="card-summary">${esc(item.summary)}</div>` : ''}
        ${item.date ? `<div class="card-time">${esc(item.date)}</div>` : ''}
      </div>
      ${item.thumbnail ? `<img class="card-thumb" src="${esc(item.thumbnail)}" alt="" loading="lazy">` : ''}
    </div>
  `;
}

/* Slider controls */
function goToSlide(i) {
  const track = document.getElementById('sliderTrack');
  const dots = document.getElementById('sliderDots');
  if (!track) return;
  const total = track.children.length;
  sliderIndex = ((i % total) + total) % total;
  track.style.transform = `translateX(-${sliderIndex * 100}%)`;
  if (dots) {
    dots.querySelectorAll('.slider-dot').forEach((d, idx) => {
      d.classList.toggle('active', idx === sliderIndex);
    });
  }
}

function nextSlide() { goToSlide(sliderIndex + 1); resetSliderTimer(); }
function prevSlide() { goToSlide(sliderIndex - 1); resetSliderTimer(); }

function startSlider(total) {
  sliderInterval = setInterval(() => goToSlide(sliderIndex + 1), 4000);
}

function stopSlider() {
  if (sliderInterval) { clearInterval(sliderInterval); sliderInterval = null; }
}

function resetSliderTimer() {
  const track = document.getElementById('sliderTrack');
  if (!track) return;
  stopSlider();
  startSlider(track.children.length);
}

function initSliderTouch() {
  const track = document.getElementById('sliderTrack');
  if (!track) return;
  let startX = 0;
  track.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
  track.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    if (dx > 40) prevSlide();
    else if (dx < -40) nextSlide();
  }, { passive: true });
}

/* Article view */
async function showArticle(id, fromPopstate) {
  stopSlider();
  const articleView = document.getElementById('articleView');
  const homeView = document.getElementById('homeView');

  homeView.style.display = 'none';
  articleView.style.display = 'block';
  document.getElementById('backBtn').style.display = 'block';
  articleView.innerHTML = '<div class="loading">載入文章中...</div>';

  if (!fromPopstate) {
    history.pushState({ article: id }, '', `#article/${id}`);
  }

  try {
    const resp = await fetch(`${BASE}/data/articles/${id}.json?v=${Date.now()}`);
    if (!resp.ok) throw new Error();
    const art = await resp.json();
    if (!art.title && (!art.body || !art.body.length)) throw new Error();
    renderArticle(art);
  } catch (e) {
    articleView.innerHTML = '<div class="empty">此文章可能為付費內容或已下架</div>';
  }

  window.scrollTo(0, 0);
}

function renderArticle(art) {
  const metaParts = [art.date, art.source, art.author, art.section].filter(Boolean);

  let bodyHtml = '';
  for (const part of (art.body || [])) {
    if (part.type === 'text') {
      bodyHtml += `<p>${esc(part.content)}</p>`;
    } else if (part.type === 'image') {
      bodyHtml += `<img class="inline-img" src="${esc(part.src)}" alt="${esc(part.alt || '')}">`;
      if (part.caption) {
        bodyHtml += `<div class="inline-caption">${esc(part.caption)}</div>`;
      }
    }
  }

  let coverHtml = '';
  if (art.cover_image && art.cover_image.src) {
    coverHtml = `<img class="article-cover" src="${esc(art.cover_image.src)}" alt="${esc(art.cover_image.alt || '')}">`;
    if (art.cover_image.caption) {
      coverHtml += `<div class="article-cover-caption">${esc(art.cover_image.caption)}</div>`;
    }
  }

  document.getElementById('articleView').innerHTML = `
    <h1>${esc(art.title)}</h1>
    <div class="article-meta">${esc(metaParts.join(' | '))}</div>
    ${coverHtml}
    <div class="article-body">${bodyHtml}</div>
  `;
}

function goHome(fromPopstate) {
  document.getElementById('homeView').style.display = '';
  document.getElementById('articleView').style.display = 'none';
  document.getElementById('backBtn').style.display = 'none';
  if (!fromPopstate) {
    history.pushState(null, '', window.location.pathname);
  }
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

/* Scroll-to-top button visibility */
window.addEventListener('scroll', () => {
  document.getElementById('scrollTop').classList.toggle('visible', window.scrollY > 400);
}, { passive: true });

/* Auto-refresh: track client fetch time in localStorage */
function recordFetch() {
  localStorage.setItem('lastFetchTime', Date.now().toString());
}

function getLastFetchAge() {
  const t = parseInt(localStorage.getItem('lastFetchTime') || '0');
  return Date.now() - t;
}

async function refreshData() {
  try {
    const cb = Date.now();
    const listResp = await fetch(`${BASE}/data/listings.json?v=${cb}`);
    data = await listResp.json();
    const metaResp = await fetch(`${BASE}/data/meta.json?v=${cb}`);
    const meta = await metaResp.json();
    if (meta.updated_at) {
      lastUpdated = meta.updated_at;
      const d = new Date(meta.updated_at);
      const local = d.toLocaleString('zh-TW', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
      document.getElementById('updateTime').textContent = `最後更新：${local}`;
    }
    recordFetch();
    renderSection();
  } catch(e) {}
}

// On page load: if last fetch was >2 hours ago, refresh immediately
let lastUpdated = null;
const origInit = init;
init = async function() {
  await origInit();
  recordFetch();
  // Check every 5 minutes if 2 hours have passed since last fetch
  setInterval(() => {
    if (getLastFetchAge() > 2 * 60 * 60 * 1000) {
      refreshData();
    }
  }, 5 * 60 * 1000);
};

init();
</script>
</body>
</html>
